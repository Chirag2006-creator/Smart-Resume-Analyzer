services:
  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      # Passes the API key from your host environment to the container
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    volumes:
      # Syncs your local code to the container for hot-reloading
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      # Syncs your local code to the container for hot-reloading
      - ./frontend:/app
      - /app/node_modules # Prevents local node_modules from overwriting container node_modules
    depends_on:
      - backend
    restart: unless-stopped
